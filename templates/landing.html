{% extends "base.html" %}
{% block title %}Sector Scorecard{% endblock %}

{% block styles %}
<style>
.scorecard-wrap { overflow-x: auto; }
.scorecard-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; table-layout: fixed; }
.scorecard-table th, .scorecard-table td { padding: 5px 8px; border-bottom: 1px solid var(--theme-border); white-space: nowrap; }
.scorecard-table thead th { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.4px; color: var(--theme-text-muted); font-weight: 600; background: var(--theme-bg-secondary); }
.scorecard-table thead tr:first-child th { text-align: center; }
.col-divider { border-left: 2px solid var(--theme-border); }

.td-ticker { font-weight: 700; color: var(--theme-accent); width: 64px; }
.td-name   { font-size: 0.72rem; color: var(--theme-text-muted); width: 140px; overflow: hidden; text-overflow: ellipsis; }

.sc-val { font-family: ui-monospace, monospace; font-weight: 600; color: var(--theme-text-primary); }
.sc-per { font-size: 0.63rem; color: var(--theme-text-muted); }
.sc-empty { color: var(--theme-text-muted); }
.scorecard-table tbody tr:nth-child(even) td { background: var(--theme-bg-secondary); }
</style>
{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
  <h1 class="page-title" style="margin:0" data-spec-id="1.0" data-ui-id="1.0"><span class="spec-id">1.0</span>BTC Miners - Sector Scorecard</h1>
  <a href="/ops" class="btn btn-secondary btn-sm">Operations →</a>
</div>

<div class="card scorecard-wrap" data-spec-id="1.1" data-ui-id="1.1">
  <div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:0.75rem">
    <span class="spec-id">1.1</span>Monthly Scorecard <span class="source-badge source-badge-data">DATA</span>
  </div>
  <table class="scorecard-table" id="scorecard-table">
    <thead>
      <tr id="thead-sources">
        <th colspan="2"></th>
        <!-- source group headers injected by JS -->
      </tr>
      <tr id="thead-metrics">
        <th class="td-ticker">Ticker</th>
        <th class="td-name">Company</th>
        <!-- metric headers injected by JS -->
      </tr>
    </thead>
    <tbody id="scorecard-body">
      <tr><td colspan="20" style="color:var(--theme-text-muted);padding:1rem">Loading…</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  loadScorecards();
});

function formatPeriod(p) {
  if (!p) return '';
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let m;
  m = p.match(/^(\d{4})-(\d{2})-\d{2}$/);
  if (m) return MONTHS[parseInt(m[2]) - 1] + ' ' + m[1];
  m = p.match(/^(\d{4})-Q(\d)$/);
  if (m) return 'Q' + m[2] + ' ' + m[1];
  m = p.match(/^(\d{4})-FY$/);
  if (m) return 'FY ' + m[1];
  return p;
}

function fmtValue(v) {
  if (v == null) return '—';
  if (Math.abs(v) >= 1000) return v.toLocaleString(undefined, {maximumFractionDigits: 0});
  return v.toLocaleString(undefined, {maximumFractionDigits: 2});
}

function cellHtml(dp) {
  if (!dp || dp.value == null) return '<span class="sc-empty">—</span>';
  const periodLabel = dp.period_display || formatPeriod(dp.period);
  return '<div>'
    + '<span class="sc-val">' + escapeHtml(fmtValue(dp.value)) + '</span>'
    + '<br><span class="sc-per">' + escapeHtml(periodLabel || '') + '</span>'
    + '</div>';
}

async function loadScorecards() {
  const r = await fetch('/api/scorecard');
  if (!r.ok) return;
  const payload = await r.json();
  const companies = payload.data?.companies || {};
  const groups    = payload.data?.groups    || [];
  const columns   = payload.data?.columns   || [];

  const srcRow = document.getElementById('thead-sources');
  const metRow = document.getElementById('thead-metrics');
  srcRow.innerHTML = '<th colspan="2"></th>';
  metRow.innerHTML = '<th class="td-ticker">Ticker</th><th class="td-name">Company</th>';

  groups.forEach((group, i) => {
    const th = document.createElement('th');
    th.textContent = group.label || group.key;
    th.colSpan = group.colspan || 1;
    if (i === 0) th.className = 'col-divider';
    srcRow.appendChild(th);
  });

  columns.forEach((column, i) => {
    const th = document.createElement('th');
    th.textContent = column.label || column.key;
    if (i === 0) th.className = 'col-divider';
    metRow.appendChild(th);
  });

  const tbody = document.getElementById('scorecard-body');
  tbody.innerHTML = '';
  const tickers = Object.keys(companies).sort();
  if (!tickers.length) {
    tbody.innerHTML = '<tr><td colspan="' + (2 + columns.length) + '" style="color:var(--theme-text-muted);padding:1rem">No data</td></tr>';
    return;
  }

  tickers.forEach(ticker => {
    const co = companies[ticker];
    const tr = document.createElement('tr');

    // Ticker + name
    tr.innerHTML = '<td class="td-ticker">' + escapeHtml(ticker) + '</td>'
      + '<td class="td-name" title="' + escapeHtml(co.name || '') + '">' + escapeHtml(co.name || '') + '</td>';

    columns.forEach((column, i) => {
      const td = document.createElement('td');
      if (i === 0) td.className = 'col-divider';
      td.innerHTML = cellHtml(co.cells?.[column.key]);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}
</script>
{% endblock %}
